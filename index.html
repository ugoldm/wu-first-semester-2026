  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

ernance, Risk and Control A This class is only offered in winter semesters. Registration via LPIS from 2026-09-22 14:00 to 2026-09-28 23:59 De-registration via LPIS from 2026-09-22 14:00 to 2026-10-19 23:59&quot;,&quot;attendance&quot;:&quot;The rules on the attendance of a Continuous Assessment Course (PI) apply. See the dedicated page on the WU portal for further information. Quote from that page: \&quot; Pursuant to the general guidelines issued by the Vice-Rector for Academic Programs and Student Affairs, the attendance requirement is met if a student is present at least 80% of the time.&quot;,&quot;assessment&quot;:&quot;Formative assessment will take place during each session when students will work on questions, case studies or seminar papers in groups or alone for class discussion. Formal grading of work and learning outcome will include level and quality of active participation, one exam, group work assignment and presentation. Individual contributions to the formative process of group work will be assessed through participants appraising and submitting a ‘Group Work: Peer &amp; Self Assessment Form’ prior to their presentations. Individual contributions to the formative process of group work will be assessed. Your Work will count as follows: 50% Individual written exam 10% Individual participation and attendance 40% Group assignment (case study) Grading scale 91-100: 1 81-90: 2 71-80: 3 61-70: 4 51-60: 5&quot;,&quot;contents&quot;:&quot;The course will cover the following topics: Corporate governance and the role of IT Enterprise governance of IT An introduction to CobiT and internal control systems IT Planning IT Investment evaluation methods Portfolio, program and project management IT Service management IT Controlling and risk management IT Performance measurement and reporting&quot;,&quot;notes&quot;:[&quot;Choose one group: A or B.&quot;,&quot;Course offered only in the winter semester.&quot;,&quot;Attendance requirement: at least 80%.&quot;,&quot;Course design states a mixture of online and classroom sessions, but the timetable does not identify this event as online.&quot;,&quot;Assessment: Individual written exam 50%; Individual participation and attendance 10%; Group assignment (case study) 40%.&quot;],&quot;source_url&quot;:&quot;https://vvz.wu.ac.at/cgi-bin/vvz.pl?C=S&amp;LANG=DE&amp;U=H&amp;S=26W&amp;LV=3&amp;L2=S&amp;L3=S&amp;T=&amp;L=&amp;I=1193&amp;JOIN=AND&quot;},{&quot;course&quot;:&quot;Business Process Management&quot;,&quot;group&quot;:null,&quot;course_id&quot;:&quot;1194&quot;,&quot;type&quot;:&quot;PI&quot;,&quot;instructors&quot;:[&quot;Univ.Prof. Thomas Grisold, B.A.,M.Sc.,Ph.D.&quot;],&quot;language&quot;:&quot;English&quot;,&quot;credit_hours&quot;:&quot;2&quot;,&quot;event_count&quot;:8,&quot;registration&quot;:&quot;Business Process Management This class is only offered in winter semesters. Registration via LPIS from 2026-09-22 14:00 to 2026-09-28 23:59 De-registration via LPIS from 2026-09-22 14:00 to 2026-10-30 23:59&quot;,&quot;attendance&quot;:&quot;Pursuant to the general guidelines issued by the Vice-Rector for Academic Programs and Student Affairs, the attendance requirement is met if a student is present at least 80% of the time. The rules on attendance of a Continuous Assessment Course (PI) apply. See the dedicated page on the WU portal for further information.&quot;,&quot;assessment&quot;:&quot;Online Midterm: 40% Assignment: 15% Exam: 45%&quot;,&quot;contents&quot;:&quot;Business Process Management (BPM) has advanced as a key management approach. At its core, BPM aims at providing organizations with effective and efficient workflows that transform a given input into a desired output. BPM combines managerial and organizational practices with a strong focus on various information technologies. As a core technology of BPM, for example, process mining has recently been associated with tremendous economic benefits for companies operating in all kinds of industries. This course approaches the basics of BPM from two angles. First, it introduces the basic assumptions of BPM. It explains why, how and when BPM is useful for organizations. The course emphasizes strengths and opportunities of a BPM‑driven organization, and it sheds light on potential downsides and weaknesses. Second, the course conveys ʺhow‑to knowledgeʺ, enabling students to understand and apply basic practices of BPM. These include process analysis, process design and process implementation. Various in‑class exercises will help students to gain practical knowledge about BPM‑related activities.&quot;,&quot;notes&quot;:[&quot;Course offered only in the winter semester.&quot;,&quot;Attendance requirement: at least 80%.&quot;,&quot;Assessment: Online Midterm 40%; Assignment 15%; Exam 45%.&quot;],&quot;source_url&quot;:&quot;https://vvz.wu.ac.at/cgi-bin/vvz.pl?C=S&amp;LANG=DE&amp;U=H&amp;S=26W&amp;LV=3&amp;L2=S&amp;L3=S&amp;T=&amp;L=&amp;I=1194&amp;JOIN=AND&quot;},{&quot;course&quot;:&quot;Value-Based System Engineering&quot;,&quot;group&quot;:null,&quot;course_id&quot;:&quot;1195&quot;,&quot;type&quot;:&quot;PI&quot;,&quot;instructors&quot;:[&quot;Djordje Djurica, Ph.D.&quot;],&quot;language&quot;:&quot;English&quot;,&quot;credit_hours&quot;:&quot;2&quot;,&quot;event_count&quot;:8,&quot;registration&quot;:&quot;Value-Based System Engineering Registration via LPIS from 2026-09-22 14:00 to 2026-09-28 23:59 De-registration via LPIS from 2026-09-22 14:00 to 2026-10-16 23:59&quot;,&quot;attendance&quot;:&quot;General rules of PI courses apply. Therefore, the guideline value for student attendance is 80%.&quot;,&quot;assessment&quot;:&quot;30% Weekly quizzes 25% Group presentation 45% Exam Grading Scheme: 100% - 90% = excellent (1) 89% - 80% = good (2) 79% - 70% = satisfactory (3) 69% - 60% = sufficient (4) &lt;59% = insufficient (5)&quot;,&quot;contents&quot;:&quot;This course teaches students the essential elements of a Value-based Engineering for sustainable, accountable and responsible IT system design. Value-based Engineering is a Requirements&#x27; engineering and IT Innovation approach, which helps built systems in an “Ethics-by-Design” manner. Due to the combination of moral philosophy, discourse ethics, particaptory design, value sensitive design and risk-based design the course allows students to to understand the social implications of timely IT Innovations. They gain an understanding of the true human challenges arising from IT designs for direct as well as indirect stakeholders. Value-based Engineering as taught in this course introduces students to formulate an ethically aligned value strategy for IT infrastructure. Concrete approaches for the identification of technical and organizational system design requirements are presented and applied in class in the form of running, group-based, case-study exercises. The goal of the course as a whole is to give students a first theoretical as well as practical grasp of what it would mean to become a &#x27;Value Lead&#x27; for IT companies or what is now also called an \&quot;Ethical AI Advisor\&quot;. The course is accompanied by the textbook \&quot;Value-based Engineering\&quot; https://www.degruyter.com/document/doi/10.1515/9783110793383/html&quot;,&quot;notes&quot;:[&quot;Contact: djordje.djurica@wu.ac.at.&quot;,&quot;Guideline attendance is 80%.&quot;,&quot;Weekly short quizzes take place at the beginning of each session; assessment: quizzes 30%, group presentation 25%, exam 45%.&quot;],&quot;source_url&quot;:&quot;https://vvz.wu.ac.at/cgi-bin/vvz.pl?C=S&amp;LANG=DE&amp;U=H&amp;S=26W&amp;LV=3&amp;L2=S&amp;L3=S&amp;T=&amp;L=&amp;I=1195&amp;JOIN=AND&quot;},{&quot;course&quot;:&quot;Marketing and Innovation&quot;,&quot;group&quot;:&quot;A&quot;,&quot;course_id&quot;:&quot;1196&quot;,&quot;type&quot;:&quot;PI&quot;,&quot;instructors&quot;:[&quot;Univ.Prof. Dr. Christina Schamp&quot;,&quot;Dejan Tatic, MSc.&quot;,&quot;Mag. Lukas Kerschbaum&quot;],&quot;language&quot;:&quot;English&quot;,&quot;credit_hours&quot;:&quot;2&quot;,&quot;event_count&quot;:11,&quot;registration&quot;:&quot;Marketing and Innovation A This class is only offered in winter semesters. Registration via LPIS from 2026-09-22 14:00 to 2026-09-28 23:59 De-registration via LPIS from 2026-09-22 14:00 to 2026-10-12 23:59&quot;,&quot;attendance&quot;:&quot;Participation in all sessions is mandatory. You may miss up to max. 20% of class hours, but please note that content is build-up in a modular way. According to WU rules, you have to attend 80% of the sessions in this course.&quot;,&quot;assessment&quot;:&quot;Weights for each grading component used to compute your final grade: - Group case presentations: 40% - Assignments: 40% - Attendance/Participation: 10% - Peer review: 10% The quizzes and in-class participation is graded at the individual level, while the group project work is graded at the group level. We also want to ensure equal contribution of group members to the group work. Thus, a peer assessment will be conducted among group members, which enters into the computation of the individual grades for your group work. This means that the members of a group are required to assess other students regarding their relative contribution. The policies for the use of AI tools will be provided in the instructions for every assignment individually.&quot;,&quot;contents&quot;:&quot;Digital technologies have profoundly changed the way and pace of companies interacting with their customers and innovating their products. For instance, today&#x27;s marketers and researchers are faced with an enormous amount and variety of data that consumers share online - from product feedback via text messages and reviews, to images and videos posted by branded experiences on social media. At the same time, companies also strive to interact with their customers on various social media channels by producing compelling and relevant multimedia content for their target audiences, and to incorporate customer feedback and needs in their product development. This course intends to provide the theoretical foundations behind state-of-the art marketing and innovation in the digital economy to address these challenges in digital management practice. Our course will cover the following modules: - Marketing strategy implications of moving from the traditional to the digital economy - Idea generation and innovation processes - Insights from data: Analyzing digital customer journeys and how leverage the abundance of (customer) data and the latest AI developments for marketing and innovation decisions - Social media marketing: Social network theory, digital customer-brand relationships, user-generated content and mechanisms behind virality of digital content - Measuring success of your marketing measures: Social monitoring, social listening, and metrics to measure success on social media - Customers as co-producers, feedback validation loops, and the minimum viable product The course will be based on marketing/management articles in leading academic journals, case studies and guest lectures from marketing and innovation practice.&quot;,&quot;notes&quot;:[&quot;Choose one group: A or B.&quot;,&quot;Course offered only in the winter semester.&quot;,&quot;Attendance requirement: at least 80%.&quot;,&quot;Assessment: Group case presentations 40%; Assignments 40%; Attendance/Participation 10%; Peer review 10%.&quot;],&quot;source_url&quot;:&quot;https://vvz.wu.ac.at/cgi-bin/vvz.pl?C=S&amp;LANG=DE&amp;U=H&amp;S=26W&amp;LV=3&amp;L2=S&amp;L3=S&amp;T=&amp;L=&amp;I=1196&amp;JOIN=AND&quot;},{&quot;course&quot;:&quot;Marketing and Innovation&quot;,&quot;group&quot;:&quot;B&quot;,&quot;course_id&quot;:&quot;1228&quot;,&quot;type&quot;:&quot;PI&quot;,&quot;instructors&quot;:[&quot;Univ.Prof. Dr. Christina Schamp&quot;,&quot;Dejan Tatic, MSc.&quot;,&quot;Mag. Lukas Kerschbaum&quot;],&quot;language&quot;:&quot;English&quot;,&quot;credit_hours&quot;:&quot;2&quot;,&quot;event_count&quot;:11,&quot;registration&quo cal foundations behind state-of-the art marketing and innovation in the digital economy to address these challenges in digital management practice. Our course will cover the following modules: - Marketing strategy implications of moving from the traditional to the digital economy - Idea generation and innovation processes - Insights from data: Analyzing digital customer journeys and how leverage the abundance of (customer) data and the latest AI developments for marketing and innovation decisions - Social media marketing: Social network theory, digital customer-brand relationships, user-generated content and mechanisms behind virality of digital content - Measuring success of your marketing measures: Social monitoring, social listening, and metrics to measure success on social media - Customers as co-producers, feedback validation loops, and the minimum viable product The course will be based on marketing/management articles in leading academic journals, case studies and guest lectures from marketing and innovation practice.&quot;,&quot;notes&quot;:[&quot;Choose one group: A or B.&quot;,&quot;Course offered only in the winter semester.&quot;,&quot;Attendance requirement: at least 80%.&quot;,&quot;Assessment: Group case presentations 40%; Assignments 40%; Attendance/Participation 10%; Peer review 10%.&quot;],&quot;source_url&quot;:&quot;https://vvz.wu.ac.at/cgi-bin/vvz.pl?C=S&amp;LANG=DE&amp;U=H&amp;S=26W&amp;LV=3&amp;L2=S&amp;L3=S&amp;T=&amp;L=&amp;I=1228&amp;JOIN=AND&quot;},{&quot;course&quot;:&quot;Digital Markets and Strategies&quot;,&quot;group&quot;:&quot;B&quot;,&quot;course_id&quot;:&quot;1312&quot;,&quot;type&quot;:&quot;PI&quot;,&quot;instructors&quot;:[&quot;Univ.Prof. Dr. Verena Dorner&quot;,&quot;Univ.Prof. Dr. Gerlinde Fellner-Röhling&quot;,&quot;Johan Santiago Ruiz Moreno, M.Sc.&quot;],&quot;language&quot;:&quot;English&quot;,&quot;credit_hours&quot;:&quot;4&quot;,&quot;event_count&quot;:14,&quot;registration&quot;:&quot;Digital Markets and Strategies B This class is only offered in winter semesters. Registration via LPIS from 2026-09-22 14:00 to 2026-09-28 23:59 De-registration via LPIS from 2026-09-22 14:00 to 2026-10-25 23:59&quot;,&quot;attendance&quot;:&quot;· Students must be present in the first unit. · Regular attendance is compulsory (at least 80% of lectures). Please notify the lecturers about your absence via e-mail before the unit.&quot;,&quot;assessment&quot;:&quot;Group presentations: 40% Peer review: 20% Excercises: 40% Grading scale: 90% to 100% Excellent (1) 80% to &lt;90% Good (2) 70% to &lt;80% Satisfactory (3) 60% to &lt;70% Sufficient (4) &lt;60% Fail (5)&quot;,&quot;contents&quot;:&quot;This course offers an introduction to the characteristics of digital markets, the strategic competition of firms on these markets and aspects of consumer behavior such as privacy, copyright and social media. Students learn how market platforms work, how network effects change classical business models and how firms can use particular market strategies (with respect to prices and product differentiation) to remain competitive on digital markets. Aspects such as reputation mechanisms to enhance trust on digital markets and product recommendations will be analyzed and discussed. Copyright and privacy issues as well as the discussion of (dis-)information spread in digital media complement the topics from the consumer perspective. The course will discuss the basic theory and terminology as well as evidence from the field and applications, and apply basic statistical methods to experimental and empirical data for hypothesis testing.&quot;,&quot;notes&quot;:{&quot;attendance&quot;:&quot;· Students must be present in the first unit. · Regular attendance is compulsory (at least 80% of lectures). Please notify the lecturers about your absence via e-mail before the unit.&quot;,&quot;teaching_learning_methods&quot;:&quot;The contents of the course build on theoretical models, empirical evidence and practical application, een each group and the instructor, 5 marks) Project Deliverable 4: Complete project report with all sections. (Deadline: Monday, 06/30/26, 11:59 PM; 25 marks; Total references ≥ 40) Final Exam Monday 06/22/26 12:30 to 14:30 TC.2.01. 60 Marks Grading Criteria Unsatisfactory : ≤ 60% Sufficient : &gt; 60 % to ≤ 70 % Satisfactory : &gt; 70 % to ≤ 80 % Good : &gt; 80 % to ≤ 90 % Excellent : &gt; 90 %&quot;,&quot;contents&quot;:&quot;This is a graduate level course that is focusing on security and privacy issues in complex socio-cyber-physical systems from the threat modeling perspective. The students will learn and apply a systematic security and privacy threat modeling approach, and at the same time be exposed to and learn about a selection of the standard security and privacy problems, attacks, and development challenges. The course will also expose the students to a selection of the current security and privacy research and development challenges.&quot;,&quot;notes&quot;:[&quot;Contact: Sajjad.khan@wu.ac.at.&quot;,&quot;80% attendance is required.&quot;,&quot;The assessment text on the page contains dates in March-June 2026 that conflict with the WiSe 2026/27 timetable and appear stale; they are not normalized as current-semester events.&quot;],&quot;source_url&quot;:&quot;https://vvz.wu.ac.at/cgi-bin/vvz.pl?C=S&amp;LANG=DE&amp;U=H&amp;S=26W&amp;LV=3&amp;L2=S&amp;L3=S&amp;T=&amp;L=&amp;I=1380&amp;JOIN=AND&quot;},{&quot;course&quot;:&quot;Foundations of Digital Economy&quot;,&quot;group&quot;:&quot;A&quot;,&quot;course_id&quot;:&quot;2430&quot;,&quot;type&quot;:&quot;PI&quot;,&quot;instructors&quot;:[&quot;Dr. Dmitri Bershadskyy&quot;,&quot;Ass.Prof. Dr. Svitlana Vakulenko&quot;,&quot;Daniil Dobriy, MSc (WU)&quot;],&quot;language&quot;:&quot;English&quot;,&quot;credit_hours&quot;:&quot;2&quot;,&quot;event_count&quot;:15,&quot;registration&quot;:&quot;Foundations of Digital Economy - A This class is only offered in winter semesters. Registration via LPIS from 2026-09-21     root.querySelector(&#x27;#event-hero&#x27;).innerHTML = `&lt;div class=&quot;wu-hero-item&quot;&gt;&lt;i data-lucide=&quot;calendar-days&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span class=&quot;wu-hero-copy&quot;&gt;&lt;span class=&quot;text-small text-muted&quot;&gt;Date&lt;/span&gt;&lt;strong class=&quot;wu-hero-value&quot;&gt;${esc(formattedDate)}&lt;/strong&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;wu-hero-item&quot;&gt;&lt;i data-lucide=&quot;clock-3&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span class=&quot;wu-hero-copy&quot;&gt;&lt;span class=&quot;text-small text-muted&quot;&gt;Time&lt;/span&gt;&lt;strong class=&quot;wu-hero-value&quot;&gt;${esc(e.start_time)}–${esc(e.end_time)}&lt;/strong&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;wu-hero-item&quot;&gt;&lt;i data-lucide=&quot;map-pin&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span class=&quot;wu-hero-copy&quot;&gt;&lt;span class=&quot;text-small text-muted&quot;&gt;Room&lt;/span&gt;&lt;strong class=&quot;wu-hero-value&quot;&gt;${esc(e.room || &#x27;Not specified&#x27;)}&lt;/strong&gt;&lt;/span&gt;&lt;/div&gt;`;
    root.querySelector(&#x27;#event-detail&#x27;).innerHTML = `${row(&#x27;users&#x27;, &#x27;Instructors&#x27;, e.instructors.join(&#x27;; &#x27;))}${row(&#x27;presentation&#x27;, &#x27;Course type&#x27;, `${e.course_type} · ${e.event_label}`)}${row(&#x27;monitor-smartphone&#x27;, &#x27;Format&#x27;, deliveryLabels[e.delivery_mode] || e.delivery_mode)}${row(&#x27;languages&#x27;, &#x27;Language&#x27;, e.language || &#x27;Not specified&#x27;)}${row(&#x27;hash&#x27;, &#x27;WU course number&#x27;, e.course_id)}${conflict ? `&lt;div class=&quot;wu-conflict-panel&quot;&gt;&lt;i data-lucide=&quot;triangle-alert&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span class=&quot;wu-conflict-copy&quot;&gt;&lt;strong&gt;Schedule conflict&lt;/strong&gt;&lt;span&gt;${esc(conflictNames.join(&#x27;; &#x27;))}&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;` : &#x27;&#x27;}`;
    root.querySelector(&#x27;#event-modal-footer&#x27;).innerHTML = `&lt;a class=&quot;btn btn-primary&quot; href=&quot;${esc(e.source_url)}&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer&quot;&gt;&lt;i data-lucide=&quot;external-link&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; Open in WU&lt;/a&gt;`;
    const modal = root.querySelector(&#x27;#event-modal&#x27;);
    if (!modal.open) modal.showModal();
    if (typeof lucide !== &#x27;undefined&#x27;) lucide.createIcons({ attrs: { width: 16, height: 16 } });
  }

  function getWeekStart(dateString) {
    const date = new Date(`${dateString}T12:00:00Z`);
    const daysSinceMonday = (date.getUTCDay() + 6) % 7;
    date.setUTCDate(date.getUTCDate() - daysSinceMonday);
    return date.toISOString().slice(0, 10);
  }

  function getDurationMinutes(event) {
    const [startHours, startMinutes] = event.start_time.split(&#x27;:&#x27;).map(Number);
    const [endHours, endMinutes] = event.end_time.split(&#x27;:&#x27;).map(Number);
    return (endHours * 60 + endMinutes) - (startHours * 60 + startMinutes);
  }

  function updateSelectionMetrics(visible, month) {
    const selectedCourses = [...activeCourses];
    const ects = selectedCourses.reduce((total, course) =&gt; total + (courseEcts[course] || 0), 0);
    const totalMinutes = visible.reduce((total, event) =&gt; total + getDurationMinutes(event), 0);
    const teachingWeeks = new Set(visible.map(event =&gt; getWeekStart(event.date))).size;
    const averageClockHours = teachingWeeks ? totalMinutes / 60 / teachingWeeks : 0;
    const hoursLabel = new Intl.NumberFormat(&#x27;en-GB&#x27;, { maximumFractionDigits: 1 }).format(averageClockHours);
    const count = selectedCourses.length;
    const countLabel = count === 1 ? &#x27;course&#x27; : &#x27;courses&#x27;;
    root.querySelector(&#x27;#mobile-selected-count&#x27;).textContent = `${count} of ${courseNames.length}`;
    const weekLabel = teachingWeeks === 1 ? &#x27;teaching week&#x27; : &#x27;teaching weeks&#x27;;
    const hoursTooltip = teachingWeeks ? `${month.label}: total duration of selected classes in clock hours ÷ ${teachingWeeks} ${weekLabel} with classes` : `${month.label}: no classes for the selected courses`;
    root.querySelector(&#x27;#selection-metrics&#x27;).innerHTML = `&lt;span&gt;&lt;strong&gt;${ects}&lt;/strong&gt; ECTS&lt;/span&gt;&lt;span&gt;&lt;strong&gt;${count}&lt;/strong&gt; ${countLabel}&lt;/span&gt;&lt;span data-tooltip=&quot;${esc(hoursTooltip)}&quot;&gt;&lt;strong&gt;${hoursLabel}&lt;/strong&gt; hrs/week&lt;/span&gt;`;
  }

  function renderCalendar() {
    const month = months[monthIndex];
    const visible = DATA.events.filter(e =&gt; e.date.startsWith(month.key) &amp;&amp; activeCourses.has(e.course) &amp;&amp; (!e.group || selectedGroups[e.course] === e.group));
    updateSelectionMetrics(visible, month);
    visibleEventIds = new Set(visible.map(e =&gt; e.id));
    root.querySelector(&#x27;#calendar-heading&#x27;).textContent = month.label;
    root.querySelector(&#x27;#prev-month&#x27;).disabled = monthIndex === 0;
    root.querySelector(&#x27;#next-month&#x27;).disabled = monthIndex === months.length - 1;
    const [year, mon] = month.key.split(&#x27;-&#x27;).map(Number);
    const days = new Date(Date.UTC(year, mon, 0)).getUTCDate();
    const firstDow = (new Date(Date.UTC(year, mon-1, 1)).getUTCDay() + 6) % 7;
    let html = &#x27;&#x27;;
    for (let i=0; i&lt;firstDow; i++) html += &#x27;&lt;div class=&quot;wu-day is-outside&quot; role=&quot;gridcell&quot;&gt;&lt;/div&gt;&#x27;;
    for (let day=1; day&lt;=days; day++) {
      const date = `${year}-${String(mon).padStart(2,&#x27;0&#x27;)}-${String(day).padStart(2,&#x27;0&#x27;)}`;
      const entries = visible.filter(e =&gt; e.date === date).sort((a,b) =&gt; a.start_time.localeCompare(b.start_time));
      const buttons = entries.map(e =&gt; {
        const conflict = isVisibleConflict(e);
        return `&lt;button type=&quot;button&quot; class=&quot;btn btn-block&quot; style=&quot;--series-color:${courseColor[e.course]}&quot; data-event-id=&quot;${e.id}&quot; aria-label=&quot;${esc(e.course)} ${esc(e.start_time)}–${esc(e.end_time)}&quot;&gt;&lt;span class=&quot;wu-event-line&quot;&gt;&lt;span class=&quot;wu-event-swatch&quot; style=&quot;--series-color:${courseColor[e.course]}&quot;&gt;&lt;/span&gt;&lt;span class=&quot;wu-event-text&quot;&gt;&lt;span class=&quot;wu-event-time&quot;&gt;${esc(e.start_time)}–${esc(e.end_time)}&lt;/span&gt;&lt;span class=&quot;wu-event-name-wrap&quot;&gt;&lt;span class=&quot;wu-event-name&quot;&gt;&lt;span class=&quot;wu-event-name-full&quot;&gt;${esc(e.course)}${esc(group(e))}&lt;/span&gt;&lt;span class=&quot;wu-event-name-short&quot;&gt;${esc(short[e.course] || e.course)}${esc(group(e))}&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;${conflict ? &#x27;&lt;span class=&quot;wu-conflict-mark&quot; aria-label=&quot;Schedule conflict&quot;&gt;!&lt;/span&gt;&#x27; : &#x27;&#x27;}&lt;/span&gt;&lt;/button&gt;`;
      }).join(&#x27;&#x27;);
      html += `&lt;div class=&quot;wu-day${entries.length ? &#x27;&#x27; : &#x27; is-empty&#x27;}&quot; role=&quot;gridcell&quot; aria-label=&quot;${date}&quot;&gt;&lt;span class=&quot;wu-day-number text-small&quot;&gt;${day}&lt;/span&gt;&lt;div class=&quot;wu-day-events&quot;&gt;${buttons}&lt;/div&gt;&lt;/div&gt;`;
    }
    const trailingDays = (7 - ((firstDow + days) % 7)) % 7;
    for (let i=0; i&lt;trailingDays; i++) html += &#x27;&lt;div class=&quot;wu-day is-outside&quot; role=&quot;gridcell&quot;&gt;&lt;/div&gt;&#x27;;
    root.querySelector(&#x27;#calendar-grid&#x27;).innerHTML = html;
    root.querySelectorAll(&#x27;[data-event-id]&#x27;).forEach(btn =&gt; btn.addEventListener(&#x27;click&#x27;, () =&gt; { const e = byId[btn.dataset.eventId]; detail(e, isVisibleConflict(e)); }));
    if (typeof lucide !== &#x27;undefined&#x27;) lucide.createIcons({ attrs: { width: 16, height: 16 } });
  }

  root.querySelector(&#x27;#prev-month&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { if (monthIndex &gt; 0) { monthIndex--; renderCalendar(); } });
  root.querySelector(&#x27;#next-month&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { if (monthIndex &lt; months.length-1) { monthIndex++; renderCalendar(); } });
  root.querySelector(&#x27;#close-event-modal&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; root.querySelector(&#x27;#event-modal&#x27;).close());
  root.querySelector(&#x27;#event-modal&#x27;).addEventListener(&#x27;click&#x27;, event =&gt; { if (event.target === event.currentTarget) event.currentTarget.close(); });
  renderCalendar();
})();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
